<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Jack Stauber Style Fix</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; 
        }
        
        #overlay {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 15, 0.95);
            color: white;
            width: 320px; 
            height: 85px; 
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            gap: 12px;
            transition: all 0.5s ease-in-out;
            opacity: 0;
            transform: translateY(10px);
        }

        #overlay.active { opacity: 1; transform: translateY(0); }

        #album-art { width: 65px; height: 65px; border-radius: 4px; flex-shrink: 0; }

        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            /* FIX: Aseguramos que nada se salga del contenedor verticalmente */
        }

        .scroll-mask {
            width: 100%;
            overflow: hidden;
            /* FIX CRÍTICO: Evita que el texto largo salte a una segunda línea */
            white-space: nowrap; 
            mask-image: linear-gradient(to right, black 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, black 92%, transparent);
        }

        .should-scroll {
            display: inline-block;
            animation: marquee 10s linear infinite;
        }

        #artist { 
            font-size: 11px; 
            color: #2fb3a4; /* Verde/Cian más parecido a tu captura */
            letter-spacing: 0.2px;
            margin-bottom: 1px;
            display: block;
        }
        
        #title { 
            font-size: 17px; /* Bajé un pelín el tamaño para que no sature */
            color: #ffffff;
            display: block;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        <div class="info">
            <div id="artist-mask" class="scroll-mask">
                <div id="artist-container">
                    <span id="artist"></span>
                    <span id="artist-repeat" style="margin-left: 40px; display: none;"></span>
                </div>
            </div>
            <div id="title-mask" class="scroll-mask">
                <div id="title-container">
                    <span id="title"></span>
                    <span id="title-repeat" style="margin-left: 40px; display: none;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function updateSpotify() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        
                        setTimeout(() => {
                            document.getElementById('title').innerText = data.title;
                            document.getElementById('artist').innerText = data.artist;
                            document.getElementById('album-art').src = data.albumImageUrl;
                            
                            checkAndSetScroll('title', data.title);
                            checkAndSetScroll('artist', data.artist);

                            widget.classList.add('active');
                        }, 600);
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Reconectando..."); }
        }

        function checkAndSetScroll(type, text) {
            const container = document.getElementById(type + '-container');
            const mask = document.getElementById(type + '-mask');
            const repeatEl = document.getElementById(type + '-repeat');
            const textEl = document.getElementById(type);
            
            container.classList.remove('should-scroll');
            repeatEl.style.display = 'none';

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            context.font = window.getComputedStyle(textEl).font;
            const textWidth = context.measureText(text.toLowerCase()).width;
            
            if (textWidth > (mask.offsetWidth - 5)) {
                container.classList.add('should-scroll');
                repeatEl.innerText = text;
                repeatEl.style.display = 'inline-block';
                // Ajustamos velocidad según longitud
                const duration = Math.max(7, textWidth / 25);
                container.style.animationDuration = duration + 's';
            }
        }

        setInterval(updateSpotify, 5000);
        updateSpotify();
    </script>
</body>
</html>
