<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Fixed G</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; 
            -webkit-font-smoothing: antialiased;
        }
        
        #overlay {
            position: relative;
            display: flex;
            align-items: center;
            background: #0a0a0a;
            color: white;
            width: 500px; 
            height: 115px; 
            border-radius: 0 15px 15px 0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
            overflow: hidden;
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            opacity: 0;
            transform: translateX(-40px);
        }

        #overlay.active { opacity: 1; transform: translateX(0); }

        .content-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; align-items: center;
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            z-index: 1;
        }

        .content-layer.visible { opacity: 1; z-index: 2; }

        .album-art { 
            width: 115px; height: 115px; 
            object-fit: cover; flex-shrink: 0;
            border-right: 4px solid #1DB954; 
        }

        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            /* FIX: Padding inferior para que no se corte la 'g' */
            padding-bottom: 8px; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease-in-out;
            opacity: 0;
            transform: translateX(50px);
            overflow: hidden;
        }

        .content-layer.visible .info { opacity: 1; transform: translateX(0); }
        .content-layer.hidden-out .info { opacity: 0; transform: translateX(100px); }

        .artist-text { 
            font-size: 18px; 
            color: #2fb3a4; 
            margin-bottom: 2px; 
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .title-text { 
            font-size: 28px; 
            color: #ffffff;
            /* FIX: line-height ajustado para que bajen las colas de las letras */
            line-height: 1.2; 
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;  
            overflow: hidden;
            text-overflow: ellipsis;
        }

    </style>
</head>
<body>

    <div id="overlay">
        <div id="layer-1" class="content-layer">
            <img id="album-art-1" class="album-art" src="" alt="">
            <div class="info">
                <span id="artist-1" class="artist-text"></span>
                <span id="title-1" class="title-text"></span>
            </div>
        </div>

        <div id="layer-2" class="content-layer">
            <img id="album-art-2" class="album-art" src="" alt="">
            <div class="info">
                <span id="artist-2" class="artist-text"></span>
                <span id="title-2" class="title-text"></span>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";
        let isFetching = false;
        let activeLayer = 1;

        async function updateSpotify() {
            if (isFetching) return;
            isFetching = true;

            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        if (lastTrack === "") {
                            updateLayerContent(activeLayer, data);
                            document.getElementById('layer-' + activeLayer).classList.add('visible');
                            widget.classList.add('active');
                        } else {
                            performProTransition(data);
                        }
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    setTimeout(() => {
                        document.getElementById('layer-1').classList.remove('visible');
                        document.getElementById('layer-2').classList.remove('visible');
                    }, 600);
                    lastTrack = "";
                }
            } catch (e) { console.log("Error"); } finally {
                isFetching = false;
            }
        }

        function performProTransition(data) {
            const nextLayer = activeLayer === 1 ? 2 : 1;
            const currentLayerEl = document.getElementById('layer-' + activeLayer);
            const nextLayerEl = document.getElementById('layer-' + nextLayer);

            updateLayerContent(nextLayer, data);

            currentLayerEl.classList.add('hidden-out');
            currentLayerEl.classList.remove('visible');
            nextLayerEl.classList.add('visible');

            setTimeout(() => {
                currentLayerEl.classList.remove('hidden-out');
                activeLayer = nextLayer;
            }, 500);
        }

        function updateLayerContent(layerNum, data) {
            document.getElementById('title-' + layerNum).innerText = data.title;
            document.getElementById('artist-' + layerNum).innerText = data.artist;
            document.getElementById('album-art-' + layerNum).src = data.albumImageUrl;
        }

        async function updateLoop() {
            await updateSpotify();
            let nextCheck = lastTrack === "" ? 5000 : 2000; 
            setTimeout(updateLoop, nextCheck);
        }

        updateLoop();
    </script>
</body>
</html>
