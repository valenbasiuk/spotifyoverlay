<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Pro Transitions</title>
    <style>
        /* Base: Arial Black en minúsculas */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* EL FONDO FIJO SÓLIDO */
        #overlay {
            position: relative;
            display: flex;
            align-items: center;
            background: #0a0a0a; /* Negro sólido FIJO */
            color: white;
            width: 500px; 
            height: 115px; 
            border-radius: 0 15px 15px 0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
            overflow: hidden; /* Importante para que las letras no se salgan */
            
            /* Animación de entrada inicial del panel entero */
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            opacity: 0;
            transform: translateX(-40px);
        }

        #overlay.active { opacity: 1; transform: translateX(0); }

        /* --- CAPAS DE CONTENIDO (Para transiciones) --- */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            
            /* Transición por defecto: el contenido se difumina */
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            z-index: 1;
        }

        .content-layer.visible {
            opacity: 1;
            z-index: 2;
        }

        /* --- PORTADA (DIFUMINADO - CROSSFADE) --- */
        .album-art { 
            width: 115px; height: 115px; 
            object-fit: cover; flex-shrink: 0;
            border-right: 4px solid #1DB954; 
            
            /* Transición suave de opacidad */
            transition: opacity 0.5s ease-in-out;
        }

        /* --- INFO Y LETRAS (DESLIZAMIENTO) --- */
        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            
            /* El truco: las letras se mueven de forma independiente a la capa */
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease-in-out;
            opacity: 0;
            transform: translateX(50px); /* Empieza a la derecha */
        }

        /* Cuando la capa es visible, las letras vuelven a su lugar */
        .content-layer.visible .info {
            opacity: 1;
            transform: translateX(0);
        }

        /* Cuando la capa se oculta, las letras se van a la derecha */
        .content-layer.hidden-out .info {
            opacity: 0;
            transform: translateX(100px); /* Se va lejos a la derecha */
        }

        /* --- ESTILOS DE TEXTO --- */
        #artist-1, #artist-2 { font-size: 20px; color: #2fb3a4; margin-bottom: 2px; display: block; }
        #title-1, #title-2 { font-size: 34px; color: #ffffff; display: block; line-height: 1.1; }

    </style>
</head>
<body>

    <div id="overlay">
        <div id="layer-1" class="content-layer">
            <img id="album-art-1" class="album-art" src="" alt="">
            <div class="info">
                <span id="artist-1"></span>
                <span id="title-1"></span>
            </div>
        </div>

        <div id="layer-2" class="content-layer">
            <img id="album-art-2" class="album-art" src="" alt="">
            <div class="info">
                <span id="artist-2"></span>
                <span id="title-2"></span>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";
        let isFetching = false;
        let activeLayer = 1; // 1 o 2

        async function updateSpotify() {
            if (isFetching) return;
            isFetching = true;

            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        
                        // Primer arranque: mostrar sin animación
                        if (lastTrack === "") {
                            updateLayerContent(activeLayer, data);
                            document.getElementById('layer-' + activeLayer).classList.add('visible');
                            widget.classList.add('active');
                        } else {
                            // Cambio con animación pro
                            performProTransition(data);
                        }
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    // Ocultar capas con delay
                    setTimeout(() => {
                        document.getElementById('layer-1').classList.remove('visible');
                        document.getElementById('layer-2').classList.remove('visible');
                    }, 600);
                    lastTrack = "";
                }
            } catch (e) { console.log("Error de conexión"); } finally {
                isFetching = false;
            }
        }

        function performProTransition(data) {
            const nextLayer = activeLayer === 1 ? 2 : 1;
            const currentLayerEl = document.getElementById('layer-' + activeLayer);
            const nextLayerEl = document.getElementById('layer-' + nextLayer);

            // 1. Cargamos el contenido nuevo en la capa oculta
            updateLayerContent(nextLayer, data);

            // 2. Iniciamos la animación:
            // La capa vieja se va a la derecha
            currentLayerEl.classList.add('hidden-out');
            currentLayerEl.classList.remove('visible');

            // La capa nueva aparece (se difumina la portada, entran las letras)
            nextLayerEl.classList.add('visible');

            // 3. Limpiamos estados después de la animación (0.5s)
            setTimeout(() => {
                currentLayerEl.classList.remove('hidden-out');
                activeLayer = nextLayer;
            }, 500);
        }

        function updateLayerContent(layerNum, data) {
            document.getElementById('title-' + layerNum).innerText = data.title;
            document.getElementById('artist-' + layerNum).innerText = data.artist;
            document.getElementById('album-art-' + layerNum).src = data.albumImageUrl;
        }

        // --- MODO INTELIGENTE DE TIEMPO (Anti-Ban) ---
        async function updateLoop() {
            await updateSpotify();
            
            // Si lastTrack está vacío (pausado), esperamos 5s. Si hay música, vamos cada 2s.
            let nextCheck = lastTrack === "" ? 5000 : 2000; 
            setTimeout(updateLoop, nextCheck);
        }

        // Arrancamos el loop inteligente
        updateLoop();

    </script>
</body>
</html>
