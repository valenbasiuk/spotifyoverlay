<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Integrated Style</title>
    <style>
        /* Base: Arial Black en minúsculas */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; 
        }
        
        /* Contenedor Totalmente Integrado */
        #overlay {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 15, 0.98); /* Negro casi total y sólido */
            color: white;
            
            /* TAMAÑO FIJO ESTRICTO */
            width: 380px; /* Un poco más ancho para el texto más grande */
            height: 100px; /* Un poco más alto */
            
            /* BORDES Y SOMBRA (Solo redondeamos el lado derecho) */
            border-radius: 0 12px 12px 0; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            box-sizing: border-box;
            
            /* Animación de entrada/salida (Scale In suave) */
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.9);
            transform-origin: left; /* Crece desde la portada */
        }

        #overlay.active { 
            opacity: 1; 
            transform: scale(1); 
        }

        /* PORTADA DEL ALBUM (PEGADA A LA IZQUIERDA, SIN RECUADRO) */
        #album-art { 
            width: 100px; /* Mismo alto que el contenedor para integrarse */
            height: 100px; 
            object-fit: cover; /* Asegura que la imagen cubra el cuadrado */
            border-radius: 0; /* Sin bordes redondeados */
            flex-shrink: 0; /* No se achica */
            border-right: 3px solid #1DB954; /* Una línea verde de separación elegante */
        }

        /* Contenedor de Información (Alineado con aire a la izquierda) */
        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: 0 15px; /* Un poco de aire */
            width: calc(100% - 100px); /* Espacio restante */
        }

        /* --- Estilos para el Scroll Seamless NoBlur --- */
        .scroll-mask {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            /* Máscara nítida a la izquierda, desvanecida a la derecha */
            mask-image: linear-gradient(to right, black, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, black, black 90%, transparent);
        }

        /* Clase para el Scroll Seamless */
        .should-scroll {
            display: inline-block;
            animation: marquee 10s linear infinite;
        }

        /* ARTISTA ARRIBA (Cian) - UN POCO MÁS GRANDE */
        #artist { 
            font-size: 13px; /* Subido de 11px */
            color: #2fb3a4; /* Cian Jack Stauber */
            letter-spacing: 0.3px;
            margin-bottom: 2px;
            display: block;
        }
        
        /* TÍTULO ABAJO (Blanco) - UN POCO MÁS GRANDE */
        #title { 
            font-size: 20px; /* Subido de 17px/18px */
            color: #ffffff;
            display: block;
        }

        /* Animación de Marquesina (Scroll Seamless) */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* Ajustado para el duplicado */
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        
        <div class="info">
            <div id="artist-mask" class="scroll-mask">
                <div id="artist-container">
                    <span id="artist"></span>
                    <span id="artist-repeat" style="margin-left: 40px; display: none;"></span>
                </div>
            </div>
            
            <div id="title-mask" class="scroll-mask">
                <div id="title-container">
                    <span id="title"></span>
                    <span id="title-repeat" style="margin-left: 40px; display: none;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function updateSpotify() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        
                        setTimeout(() => {
                            document.getElementById('title').innerText = data.title;
                            document.getElementById('artist').innerText = data.artist;
                            document.getElementById('album-art').src = data.albumImageUrl;
                            
                            // Comprobar Scroll Seamless individualmente
                            checkAndSetScroll('title', data.title);
                            checkAndSetScroll('artist', data.artist);

                            widget.classList.add('active');
                        }, 600);
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Reconectando..."); }
        }

        function checkAndSetScroll(type, text) {
            const container = document.getElementById(type + '-container');
            const mask = document.getElementById(type + '-mask');
            const repeatEl = document.getElementById(type + '-repeat');
            const textEl = document.getElementById(type);
            
            // Limpiamos estado anterior
            container.classList.remove('should-scroll');
            repeatEl.style.display = 'none';
            container.style.animationDuration = '10s'; 

            // Medir el texto real con lowercase aplicado
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            const computedStyle = window.getComputedStyle(textEl);
            context.font = computedStyle.font;
            const textWidth = context.measureText(text.toLowerCase()).width;
            
            const availableWidth = mask.offsetWidth;

            // Si el texto es más ancho que el espacio disponible (con un pequeño margen)
            if (textWidth > (availableWidth - 5)) {
                container.classList.add('should-scroll');
                repeatEl.innerText = text;
                repeatEl.style.display = 'inline-block';
                
                // Ajustar duración según largo del texto (más largo = más lento)
                const duration = Math.max(9, textWidth / 22);
                container.style.animationDuration = duration + 's';
            }
        }

        setInterval(updateSpotify, 5000);
        updateSpotify();
    </script>
</body>
</html>
