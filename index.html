<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Lowercase NoBlur</title>
    <style>
        /* Estilos Base - Arial Black en MINÚSCULAS */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; /* <--- Todo minusculas estricto */
        }
        
        /* Contenedor Rectangular Fijo */
        #overlay {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            width: 380px;  /* Ancho Fijo */
            height: 90px;  /* Alto Fijo */
            padding: 12px;
            border-radius: 12px;
            border-left: 6px solid #1DB954;
            box-sizing: border-box;
            gap: 15px;
            
            /* Animación de entrada/salida */
            transition: all 0.5s ease-in-out;
            opacity: 0;
            transform: translateX(-20px);
        }

        #overlay.active { opacity: 1; transform: translateX(0); }

        /* Arte del Disco */
        #album-art { 
            width: 65px; height: 65px; 
            border-radius: 8px; flex-shrink: 0; 
        }

        /* Contenedor de Información */
        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            width: calc(100% - 95px);
        }

        /* --- Estilos para el Scroll Inteligente --- */
        .scroll-mask {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            /* FIX PARA EL BLUR: Degradado más nítido a la izquierda */
            mask-image: linear-gradient(to right, black, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, black, black 90%, transparent);
        }

        /* Clase para el Scroll Seamless */
        .should-scroll {
            display: inline-block;
            animation: marquee 10s linear infinite;
        }

        #title { 
            font-size: 16px; 
            display: block;
            margin-bottom: 1px;
        }
        
        #artist { 
            font-size: 13px; 
            opacity: 0.7; 
            font-family: Arial, sans-serif; 
            font-weight: bold; 
            display: block;
        }

        /* Animación de Marquesina (Scroll Seamless) */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* Ajustado para el duplicado */
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        
        <div class="info">
            <div id="title-mask" class="scroll-mask">
                <div id="title-container">
                    <span id="title"></span>
                    <span id="title-repeat" style="margin-left: 40px; display: none;"></span>
                </div>
            </div>
            
            <div id="artist-mask" class="scroll-mask">
                <div id="artist-container">
                    <span id="artist"></span>
                    <span id="artist-repeat" style="margin-left: 40px; display: none;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function updateSpotify() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        
                        setTimeout(() => {
                            const titleEl = document.getElementById('title');
                            const artistEl = document.getElementById('artist');
                            
                            // 1. Asignar texto
                            titleEl.innerText = data.title;
                            artistEl.innerText = data.artist;
                            document.getElementById('album-art').src = data.albumImageUrl;
                            
                            // 2. Comprobar Scroll Seamless (Título)
                            checkAndSetScroll('title', data.title);
                            
                            // 3. Comprobar Scroll Seamless (Artista)
                            checkAndSetScroll('artist', data.artist);

                            widget.classList.add('active');
                        }, 600);
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Reconectando..."); }
        }

        // Función inteligente Seamless Scroll
        function checkAndSetScroll(type, text) {
            const container = document.getElementById(type + '-container');
            const mask = document.getElementById(type + '-mask');
            const repeatEl = document.getElementById(type + '-repeat');
            const textEl = document.getElementById(type);
            
            // Limpiamos estado anterior
            container.classList.remove('should-scroll');
            repeatEl.style.display = 'none';
            container.style.animationDuration = '10s'; 

            // Medir el texto de forma real (con lowercase aplicado)
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            const computedStyle = window.getComputedStyle(textEl);
            context.font = computedStyle.font;
            const textWidth = context.measureText(text.toLowerCase()).width;
            
            const availableWidth = mask.offsetWidth;

            // Si el texto es más ancho que el espacio disponible
            if (textWidth > (availableWidth - 5)) {
                container.classList.add('should-scroll');
                repeatEl.innerText = text;
                repeatEl.style.display = 'inline-block';
                
                // Ajustar duración según largo del texto
                const duration = Math.max(9, textWidth / 22);
                container.style.animationDuration = duration + 's';
            }
        }

        setInterval(updateSpotify, 5000);
        updateSpotify();
    </script>
</body>
</html>
