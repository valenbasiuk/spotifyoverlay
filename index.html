<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Square</title>
    <style>
        /* Fuente y Reset */
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial Black', Gadget, sans-serif; }
        
        /* Contenedor Cuadrado Fijo */
        #overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            width: 200px;  /* Ancho fijo */
            height: 200px; /* Alto fijo (Cuadrado) */
            padding: 15px;
            border-radius: 20px;
            border-bottom: 6px solid #1DB954;
            box-sizing: border-box;
            
            /* Animación de entrada */
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.8); /* Efecto de zoom in */
        }

        #overlay.active { 
            opacity: 1; 
            transform: scale(1); 
        }

        /* Imagen del Album */
        #album-art { 
            width: 80px; 
            height: 80px; 
            border-radius: 10px; 
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Contenedor del Texto (El secreto de la marquesina) */
        .text-container {
            width: 100%;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .scroll-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; /* Empieza fuera a la derecha */
            animation: marquee 10s linear infinite;
        }

        #title { font-size: 16px; display: block; margin-bottom: 2px; text-transform: uppercase; }
        #artist { font-size: 12px; opacity: 0.8; font-family: 'Arial', sans-serif; font-weight: bold; }

        /* Animación de Marquesina */
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        <div class="text-container">
            <div class="scroll-text">
                <span id="title"></span>
                <span id="artist"></span>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function update() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        
                        setTimeout(() => {
                            document.getElementById('title').innerText = data.title;
                            document.getElementById('artist').innerText = " — " + data.artist;
                            document.getElementById('album-art').src = data.albumImageUrl;
                            widget.classList.add('active');
                        }, 600);
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Buscando señal..."); }
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
