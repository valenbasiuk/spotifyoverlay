<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Fixed Scroll</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; 
        }
        
        #overlay {
            display: flex;
            align-items: center;
            background: #0a0a0a; /* Negro sólido */
            color: white;
            width: 450px; 
            height: 120px; 
            border-radius: 0 15px 15px 0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateX(-50px);
        }

        #overlay.active { opacity: 1; transform: translateX(0); }

        #album-art { 
            width: 120px; height: 120px; 
            object-fit: cover; flex-shrink: 0;
            border-right: 4px solid #1DB954; 
        }

        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: 0 20px;
        }

        /* Máscara para que el texto desaparezca al final del rectangulo */
        .scroll-mask {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            mask-image: linear-gradient(to right, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent);
        }

        /* Contenedor que permite el loop infinito */
        .scroll-wrapper {
            display: inline-flex; /* Para que el duplicado se pegue al original */
        }

        .should-scroll {
            animation: marquee linear infinite;
        }

        #artist { font-size: 16px; color: #2fb3a4; margin-bottom: 4px; display: block; }
        #title { font-size: 26px; color: #ffffff; display: block; }

        /* Animación: mueve el contenido 100% de su ancho original (que es la mitad del wrapper) */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        <div class="info">
            <div id="artist-mask" class="scroll-mask">
                <div id="artist-wrapper" class="scroll-wrapper">
                    <span id="artist"></span>
                    <span id="artist-repeat" style="padding-left: 50px;"></span>
                </div>
            </div>
            <div id="title-mask" class="scroll-mask">
                <div id="title-wrapper" class="scroll-wrapper">
                    <span id="title"></span>
                    <span id="title-repeat" style="padding-left: 50px;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function updateSpotify() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        
                        setTimeout(() => {
                            document.getElementById('title').innerText = data.title;
                            document.getElementById('title-repeat').innerText = data.title;
                            document.getElementById('artist').innerText = data.artist;
                            document.getElementById('artist-repeat').innerText = data.artist;
                            document.getElementById('album-art').src = data.albumImageUrl;
                            
                            checkScroll('title');
                            checkScroll('artist');

                            widget.classList.add('active');
                        }, 600);
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Error de conexión"); }
        }

        function checkScroll(type) {
            const wrapper = document.getElementById(type + '-wrapper');
            const mask = document.getElementById(type + '-mask');
            const original = document.getElementById(type);
            const repeat = document.getElementById(type + '-repeat');

            wrapper.classList.remove('should-scroll');
            repeat.style.display = 'none';

            // Medimos si el texto original supera el ancho de la máscara
            if (original.offsetWidth > mask.offsetWidth) {
                repeat.style.display = 'inline-block';
                wrapper.classList.add('should-scroll');
                
                // Velocidad dinámica: 30px por segundo aprox
                const duration = original.offsetWidth / 30;
                wrapper.style.animationDuration = duration + 's';
            }
        }

        setInterval(updateSpotify, 5000);
        updateSpotify();
    </script>
</body>
</html>
