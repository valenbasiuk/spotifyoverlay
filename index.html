<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Ultra Smooth</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: lowercase; 
            -webkit-font-smoothing: antialiased; /* Suavizado de fuente forzado */
        }
        
        #overlay {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            color: white;
            width: 500px; 
            height: 115px; 
            border-radius: 0 15px 15px 0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            opacity: 0;
            transform: translateX(-40px);
        }

        #overlay.active { opacity: 1; transform: translateX(0); }

        #album-art { 
            width: 115px; height: 115px; 
            object-fit: cover; flex-shrink: 0;
            border-right: 4px solid #1DB954; 
        }

        .info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: 0 20px;
        }

        .scroll-mask {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            mask-image: linear-gradient(to right, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 95%, transparent 100%);
        }

        /* FIX: Forzamos que el wrapper no tenga límites de ancho para evitar re-renderizado */
        .scroll-wrapper { 
            display: inline-flex;
            width: max-content; 
            will-change: transform; /* Pre-renderiza el movimiento */
        }

        .should-scroll { animation: marquee linear infinite; }

        #artist { 
            font-size: 20px; 
            color: #2fb3a4; 
            margin-bottom: 2px;
            display: block;
        }
        
        #title { 
            font-size: 34px; 
            color: #ffffff;
            display: block;
            line-height: 1.1;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        <div class="info">
            <div id="artist-mask" class="scroll-mask">
                <div id="artist-wrapper" class="scroll-wrapper">
                    <span id="artist"></span>
                    <span id="artist-repeat" style="padding-left: 60px; display: none;"></span>
                </div>
            </div>
            <div id="title-mask" class="scroll-mask">
                <div id="title-wrapper" class="scroll-wrapper">
                    <span id="title"></span>
                    <span id="title-repeat" style="padding-left: 60px; display: none;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function updateSpotify() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        setTimeout(() => {
                            updateContent('title', data.title);
                            updateContent('artist', data.artist);
                            document.getElementById('album-art').src = data.albumImageUrl;
                            widget.classList.add('active');
                        }, 600);
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Error de conexión"); }
        }

        function updateContent(type, text) {
            const main = document.getElementById(type);
            const repeat = document.getElementById(type + '-repeat');
            const wrapper = document.getElementById(type + '-wrapper');
            const mask = document.getElementById(type + '-mask');

            wrapper.classList.remove('should-scroll');
            repeat.style.display = 'none';
            main.innerText = text;

            // FIX: Usamos un pequeño delay para asegurar que el navegador mida el texto final
            requestAnimationFrame(() => {
                if (main.offsetWidth > (mask.offsetWidth - 5)) {
                    repeat.innerText = text;
                    repeat.style.display = 'inline-block';
                    wrapper.classList.add('should-scroll');
                    // Velocidad constante sin importar el largo
                    const duration = main.offsetWidth / 30; 
                    wrapper.style.animationDuration = Math.max(8, duration) + 's';
                }
            });
        }

        setInterval(updateSpotify, 5000);
        updateSpotify();
    </script>
</body>
</html>
