<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Overlay Compact</title>
    <style>
        /* Estilos Base */
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        
        /* Contenedor Rectangular Fijo (Estilo nowplaying.site) */
        #overlay {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            width: 350px;  /* Ancho Fijo */
            height: 80px;  /* Alto Fijo */
            padding: 10px;
            border-radius: 12px;
            border-left: 6px solid #1DB954;
            box-sizing: border-box;
            gap: 15px;
            
            /* Animación de entrada/salida */
            transition: all 0.5s ease-in-out;
            opacity: 0;
            transform: translateX(-20px);
        }

        #overlay.active { 
            opacity: 1; 
            transform: translateX(0); 
        }

        /* Arte del Disco */
        #album-art { 
            width: 60px; 
            height: 60px; 
            border-radius: 8px; 
            flex-shrink: 0; /* Que no se achique */
        }

        /* Contenedor de Texto con Máscara para el Scroll */
        .text-mask {
            flex-grow: 1;
            overflow: hidden;
            white-space: nowrap;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }

        .scroll-content {
            display: inline-block;
            padding-left: 20px;
            animation: marquee 12s linear infinite;
        }

        #title { font-size: 15px; text-transform: uppercase; margin-right: 10px; }
        #artist { font-size: 12px; opacity: 0.7; font-family: Arial, sans-serif; font-weight: bold; }

        /* Animación de Marquesina */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img id="album-art" src="" alt="">
        <div class="text-mask">
            <div id="scroll-wrapper" class="scroll-content">
                <span id="title"></span>
                <span id="artist"></span>
                <span id="title-repeat" style="margin-left: 40px;"></span>
                <span id="artist-repeat"></span>
            </div>
        </div>
    </div>

    <script>
        let lastTrack = "";

        async function update() {
            try {
                const res = await fetch('/api/now-playing');
                const data = await res.json();
                const widget = document.getElementById('overlay');

                if (data.isPlaying && !data.error) {
                    if (lastTrack !== data.title) {
                        widget.classList.remove('active');
                        
                        setTimeout(() => {
                            const fullTitle = data.title;
                            const fullArtist = " — " + data.artist;

                            // Actualizamos original y repetición para el scroll infinito
                            document.getElementById('title').innerText = fullTitle;
                            document.getElementById('artist').innerText = fullArtist;
                            document.getElementById('title-repeat').innerText = fullTitle;
                            document.getElementById('artist-repeat').innerText = fullArtist;
                            
                            document.getElementById('album-art').src = data.albumImageUrl;
                            widget.classList.add('active');
                        }, 600);
                        
                        lastTrack = data.title;
                    }
                } else {
                    widget.classList.remove('active');
                    lastTrack = "";
                }
            } catch (e) { console.log("Reconectando..."); }
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
